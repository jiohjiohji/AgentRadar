name: Validate Agent Config & Data

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-yaml:
    name: Validate YAML Profiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyyaml
      - run: |
          if ls data/tools/*.yaml 1>/dev/null 2>&1; then
            python scripts/validate_yaml.py data/tools/
          else
            echo "No tool profiles yet — skipping validation"
          fi

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: |
          if python -m pytest tests/ --collect-only -q 2>/dev/null | grep -q "test"; then
            python -m pytest tests/ -v --tb=short
          else
            echo "No tests yet — skipping"
          fi
