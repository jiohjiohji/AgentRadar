name = "agentRadar-api"
main = "src/index.ts"
compatibility_date = "2024-07-25"
compatibility_flags = ["nodejs_compat"]

# KV namespace for rate limiting.
# Run: npx wrangler kv:namespace create RATE_LIMIT
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "REPLACE_WITH_RATE_LIMIT_KV_ID"
preview_id = "REPLACE_WITH_RATE_LIMIT_KV_PREVIEW_ID"

# KV namespace for Pro subscriber records.
# Run: npx wrangler kv:namespace create PRO_KEYS
[[kv_namespaces]]
binding = "PRO_KEYS"
id = "REPLACE_WITH_PRO_KEYS_KV_ID"
preview_id = "REPLACE_WITH_PRO_KEYS_KV_PREVIEW_ID"

[vars]
GITHUB_RAW_BASE = "https://raw.githubusercontent.com/jiohjiohji/AgentRadar/main"
RATE_LIMIT_PER_DAY = "100000"

# Secrets (set via `wrangler secret put`, not in this file):
# STRIPE_SECRET_KEY         — from Stripe dashboard → Developers → API keys
# STRIPE_WEBHOOK_SECRET     — from Stripe dashboard → Webhooks → signing secret
