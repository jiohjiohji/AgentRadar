  r:
    value: 8
    evidence: "Stable across 6 weeks of daily use; one upstream API timeout in that period; the stateless CLI design means no state corruption risk"
  x:
    value: 7
    evidence: "Integrated with our Slack-to-markdown pipeline via a simple cron job; required custom glue code but the inputs and outputs were standard enough to make this straightforward"
  f:
    value: 6
