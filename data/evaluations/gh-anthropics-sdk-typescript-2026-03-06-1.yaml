      SDK performed reliably across 3 weeks of development and staging testing; zero
      library-level failures and the error handling pattern correctly surfaced API errors to the application layer.
  x:
    value: 9
    evidence: >
      Integrates naturally with Next.js, React, and the full TypeScript ecosystem; npm
