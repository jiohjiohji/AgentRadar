task_performed: >
  Built a Claude-powered customer support bot using the Anthropic TypeScript SDK, integrated
  into a Next.js application with streaming responses via Server-Sent Events. Implemented
  multi-turn conversations, tool use for database lookups, and typed response parsing.
  Used the SDK's type definitions to ensure type safety throughout the application.
