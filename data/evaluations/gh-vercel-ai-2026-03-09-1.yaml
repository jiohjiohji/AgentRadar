task_performed: >
  Used the Vercel AI SDK to build a real-time chat interface with streaming responses from
  Claude in a Next.js 14 App Router application. Implemented useChat hook for the frontend,
  server actions for the API layer, and multi-model support allowing runtime switching between
  Claude Sonnet and Haiku. Also tested tool use integration with the AI SDK's tool framework.
