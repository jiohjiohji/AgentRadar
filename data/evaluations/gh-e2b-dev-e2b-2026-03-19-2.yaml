task_performed: >
  Used E2B sandboxes to enable Claude to execute statistical analysis code on research
  datasets. Claude writes Python code using pandas, scipy, and matplotlib, which is
  executed in E2B sandboxes that return stdout, stderr, and generated plot images. Tested
  on 20 different analysis tasks of varying computational complexity.
