  r:
    value: 8
    evidence: >
      No outages or data loss during the 3-day evaluation sprint; all 8 team members could
      access shared evaluation results in real-time without any data conflicts.
  x:
    value: 8
    evidence: >
      Weave integrates with the broader WandB ecosystem; teams already using WandB for
      ML experiment tracking will find Weave's LLM capabilities a natural extension.
  f:
    value: 8
    evidence: >
      Team onboarding averaged 25 minutes per engineer; the decorator-based instrumentation
