task_performed: >
  Studied and ran the OpenAI Swarm examples to understand its multi-agent handoff patterns.
  Executed the triage agent, customer service agent, and weather agent demos. Adapted the
  handoff pattern to use Anthropic's Python SDK instead of the OpenAI SDK as a learning
